<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Runway</title>

  <!--
    ============================================================
    RUNWAY — Brandon's MLOps Learning Tracker
    ============================================================

    DATA MODEL (for native port reference)
    -------------------------------------
    CURRICULUM: Array<Week>
      Week {
        num: Int (1-20)
        phase: 'DevOps Fundamentals' | 'MLOps Bridge' | 'UPenn Semester'
        title: String
        blockA: Block (build, ~45 min daily)
        blockB: Block (understand, ~30 min daily)
        project: String (one shippable thing per week)
        sd: SDTrack (system design, 2-3 sessions/week)
      }
      Block {
        task: String                 // top-line action
        brief: {                     // teaching content
          insight: String            // the core idea, 2-4 sentences
          why: String                // why it matters to Brandon specifically
          terms: Array<String>       // key vocab to learn
          resource: String           // best free resource
          test: Array<String>        // self-test questions
          doneWhen: String           // completion criteria
        }
      }
      SDTrack: same shape as Block.brief, plus topic and source.

    PROGRESS STORAGE
    ----------------
    Single key in localStorage: "runway:v1"
    Value shape:
      {
        version: 1,
        progress: {
          "w{week}_d{day}_a": Boolean,    // Block A done on day
          "w{week}_d{day}_b": Boolean,    // Block B done on day
          "w{week}_project":  Boolean,    // Project shipped
          "w{week}_sd":       Boolean,    // SD sessions done
        }
      }

    NATIVE PORT NOTES
    -----------------
    - All UI state is recomputed from progress + current date
    - No backend; data lives only on device
    - For SwiftUI: TabView with 3 tabs (Now, Week, Plan)
    - Streak rule: a day counts if either Block A OR Block B done (forgiving)
    - START_DATE drives current week derivation; let user override in settings
  -->

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Runway" />
  <meta name="theme-color" content="#0E0D0B" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230E0D0B'/><circle cx='90' cy='90' r='44' fill='none' stroke='%23E8A547' stroke-width='8'/><path d='M70 90 L86 106 L114 76' fill='none' stroke='%23E8A547' stroke-width='10' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230E0D0B'/><circle cx='90' cy='90' r='44' fill='none' stroke='%23E8A547' stroke-width='8'/><path d='M70 90 L86 106 L114 76' fill='none' stroke='%23E8A547' stroke-width='10' stroke-linecap='round' stroke-linejoin='round'/></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&family=JetBrains+Mono:wght@400;500;600&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #0E0D0B; color: #E8E4DC; font-family: 'Inter Tight', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
    body { padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left); background: radial-gradient(ellipse at top, #1A1815 0%, #0E0D0B 60%); min-height: 100vh; min-height: 100dvh; }
    button { cursor: pointer; border: none; background: none; color: inherit; font-family: inherit; font-size: inherit; }
    ::selection { background: #E8A547; color: #0E0D0B; }

    .app { max-width: 480px; margin: 0 auto; padding-bottom: calc(72px + env(safe-area-inset-bottom)); min-height: 100dvh; }

    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px 12px; border-bottom: 1px solid #2A2722; }
    .brand { font-family: 'Fraunces', serif; font-weight: 600; font-size: 22px; letter-spacing: -0.02em; color: #F2EDE3; }
    .brand .dot { color: #E8A547; }
    .streak { display: flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; }
    .streak-num { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 700; color: #E8A547; line-height: 1; font-variant-numeric: tabular-nums; }
    .streak-label { font-size: 10px; color: #8A8478; letter-spacing: 0.1em; text-transform: uppercase; }

    .view { padding: 20px; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .kicker { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: #8A8478; text-transform: uppercase; margin-bottom: 8px; }
    .phase-tag { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.15em; color: #0E0D0B; padding: 4px 10px; border-radius: 2px; margin-bottom: 14px; text-transform: uppercase; }
    .week-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #8A8478; letter-spacing: 0.08em; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
    .now-badge { background: #E8A547; color: #0E0D0B; padding: 2px 6px; border-radius: 2px; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; }
    .week-title { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 600; color: #F2EDE3; line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 24px; }

    /* NOW view */
    .now-hero { text-align: center; padding: 28px 0 12px; }
    .now-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #8A8478; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px; }
    .now-day { font-family: 'Fraunces', serif; font-style: italic; font-size: 44px; font-weight: 400; color: #F2EDE3; letter-spacing: -0.02em; line-height: 1; margin-bottom: 24px; }
    .now-week-pill { display: inline-block; padding: 6px 14px; background: #16140F; border: 1px solid #2A2722; border-radius: 100px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #D4CFC2; letter-spacing: 0.1em; }

    /* BIG BLOCK CARDS */
    .big-block { width: 100%; padding: 22px 20px; background: #16140F; border: 1px solid #2A2722; border-radius: 8px; margin-bottom: 14px; text-align: left; transition: all 0.2s ease; display: block; }
    .big-block:active { transform: scale(0.985); }
    .big-block .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .big-block .tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.15em; color: #E8A547; }
    .big-block .duration { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #8A8478; letter-spacing: 0.05em; }
    .big-block .desc { font-size: 15px; line-height: 1.5; color: #D4CFC2; }
    .big-block .check-circle { width: 24px; height: 24px; border: 1.5px solid #3A3530; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s ease; }
    .big-block.done { background: #1F1A12; border-color: #E8A547; }
    .big-block.done .check-circle { background: #E8A547; border-color: #E8A547; color: #0E0D0B; font-weight: 700; }
    .big-block.b-block .tag { color: #A8B59E; }
    .big-block.b-block.done { background: #1A2017; border-color: #7A8B6F; }
    .big-block.b-block.done .check-circle { background: #7A8B6F; border-color: #7A8B6F; color: #0E0D0B; }

    /* LEARN MORE expansion */
    .learn-toggle { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #8A8478; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 14px; padding: 4px 0; cursor: pointer; }
    .learn-toggle .arrow { transition: transform 0.2s ease; display: inline-block; }
    .learn-toggle.open .arrow { transform: rotate(90deg); }
    .brief { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid #2A2722; animation: fadeIn 0.25s ease; }
    .brief.open { display: block; }
    .brief-section { margin-bottom: 14px; }
    .brief-section:last-child { margin-bottom: 0; }
    .brief-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.2em; color: #E8A547; text-transform: uppercase; margin-bottom: 6px; }
    .brief.b-brief .brief-label { color: #A8B59E; }
    .brief.sd-brief .brief-label { color: #8FA6B5; }
    .brief-text { font-size: 14px; line-height: 1.55; color: #D4CFC2; }
    .brief-why { font-size: 13px; line-height: 1.55; color: #B5AFA0; font-style: italic; padding-left: 12px; border-left: 2px solid #2A2722; }
    .brief-terms { display: flex; flex-wrap: wrap; gap: 5px; }
    .brief-term { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #D4CFC2; background: #0E0D0B; border: 1px solid #2A2722; padding: 3px 8px; border-radius: 100px; }
    .brief.b-brief .brief-term { border-color: #2A3329; }
    .brief.sd-brief .brief-term { border-color: #2A3540; color: #C5D0D9; }
    .brief-resource { font-size: 13px; line-height: 1.5; color: #D4CFC2; padding: 10px 12px; background: #0E0D0B; border-radius: 4px; border-left: 2px solid #E8A547; }
    .brief.b-brief .brief-resource { border-left-color: #7A8B6F; }
    .brief.sd-brief .brief-resource { border-left-color: #8FA6B5; }
    .brief-tests { list-style: none; padding: 0; }
    .brief-tests li { font-size: 13px; line-height: 1.5; color: #D4CFC2; padding: 6px 0 6px 24px; position: relative; }
    .brief-tests li::before { content: '?'; position: absolute; left: 4px; top: 6px; font-family: 'Fraunces', serif; font-size: 14px; color: #E8A547; font-weight: 600; }
    .brief.b-brief .brief-tests li::before { color: #7A8B6F; }
    .brief.sd-brief .brief-tests li::before { color: #8FA6B5; }
    .brief-done { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #D4CFC2; padding: 8px 12px; background: rgba(232, 165, 71, 0.06); border-radius: 4px; border: 1px solid rgba(232, 165, 71, 0.2); }

    /* DAY GRID (Week view) */
    .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin: 24px 0; }
    .day-col { background: #0E0D0B; border: 1px solid #2A2722; border-radius: 4px; padding: 10px 4px 8px; text-align: center; }
    .day-col.today { background: #1F1A12; border-color: #E8A547; }
    .day-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #8A8478; letter-spacing: 0.1em; }
    .day-date { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; color: #F2EDE3; margin: 2px 0 8px; font-variant-numeric: tabular-nums; }
    .check-btn { width: 100%; padding: 5px 0; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: #5A554A; background: transparent; border: 1px solid #2A2722; border-radius: 2px; margin-bottom: 3px; transition: all 0.15s ease; min-height: 24px; }
    .check-btn.done-a { background: #E8A547; color: #0E0D0B; border-color: #E8A547; }
    .check-btn.done-b { background: #7A8B6F; color: #0E0D0B; border-color: #7A8B6F; }

    /* WEEK view block descriptions */
    .block-section { padding-bottom: 18px; margin-bottom: 18px; border-bottom: 1px solid #2A2722; }
    .block-header { display: flex; gap: 14px; align-items: baseline; margin-bottom: 8px; }
    .block-tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.15em; color: #E8A547; }
    .block-tag.b { color: #A8B59E; }
    .block-duration { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #8A8478; }
    .block-text { font-size: 15px; line-height: 1.55; color: #D4CFC2; }

    /* PROJECT */
    .project-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #2A2722; }
    .project-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; color: #8A8478; margin-bottom: 10px; text-transform: uppercase; }
    .project-btn { width: 100%; display: flex; align-items: flex-start; gap: 14px; padding: 18px; background: #0E0D0B; border: 1px dashed #3A3530; border-radius: 6px; text-align: left; font-size: 14px; color: #D4CFC2; line-height: 1.5; transition: all 0.2s ease; }
    .project-btn:active { transform: scale(0.99); }
    .project-btn.done { background: #1A2017; border: 1px solid #7A8B6F; border-style: solid; color: #A8B59E; }
    .project-check { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; color: #E8A547; line-height: 1; flex-shrink: 0; }
    .project-btn.done .project-check { color: #7A8B6F; }

    /* SYSTEM DESIGN */
    .sd-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #2A2722; }
    .sd-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; color: #8FA6B5; margin-bottom: 10px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
    .sd-label::before { content: '◇'; color: #8FA6B5; }
    .sd-card { background: #0E0D0B; border: 1px solid #2A3540; border-radius: 6px; padding: 18px; }
    .sd-card.done { background: #131A20; border-color: #8FA6B5; }
    .sd-card-header { display: flex; align-items: flex-start; gap: 14px; cursor: pointer; }
    .sd-check { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; color: #8FA6B5; line-height: 1; flex-shrink: 0; padding: 2px 0; }
    .sd-body { flex: 1; }
    .sd-topic { font-size: 14px; color: #D4CFC2; line-height: 1.5; margin-bottom: 6px; font-weight: 500; }
    .sd-card.done .sd-topic { color: #A8B5C0; }
    .sd-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #6B7A85; letter-spacing: 0.05em; line-height: 1.5; }
    .sd-cadence { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #6B7A85; letter-spacing: 0.1em; margin-top: 8px; padding-top: 8px; border-top: 1px solid #1A2126; }
    .sd-toggle-row { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 12px; border-top: 1px solid #1A2126; }
    .sd-toggle-btn { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #8A8478; letter-spacing: 0.15em; text-transform: uppercase; padding: 6px 10px; border: 1px solid #2A2722; border-radius: 2px; }
    .sd-toggle-btn:active { background: #1A2126; }
    .sd-toggle-btn.active { color: #0E0D0B; background: #8FA6B5; border-color: #8FA6B5; }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 20px; }
    .stat { background: #16140F; border: 1px solid #2A2722; border-radius: 6px; padding: 14px; }
    .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.15em; color: #8A8478; margin-bottom: 6px; text-transform: uppercase; }
    .stat-value { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: #F2EDE3; font-variant-numeric: tabular-nums; margin-bottom: 8px; }
    .stat-bar { height: 2px; background: #2A2722; border-radius: 1px; overflow: hidden; }
    .stat-bar-fill { height: 100%; background: #E8A547; transition: width 0.4s ease; }

    /* PLAN view */
    .milestone-row { padding: 12px 4px 6px; display: flex; flex-direction: column; gap: 2px; }
    .milestone-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #E8A547; letter-spacing: 0.2em; font-weight: 600; }
    .milestone-desc { font-size: 11px; color: #8A8478; font-style: italic; padding-left: 14px; }
    .timeline-row { width: 100%; display: grid; grid-template-columns: auto auto 1fr auto; align-items: center; gap: 10px; padding: 12px 8px; border-radius: 4px; text-align: left; transition: all 0.15s ease; margin-bottom: 2px; }
    .timeline-row:active { background: #1F1A12; }
    .timeline-row.current { background: rgba(232, 165, 71, 0.06); }
    .timeline-row.past { opacity: 0.55; }
    .timeline-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .timeline-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #8A8478; font-weight: 500; font-variant-numeric: tabular-nums; }
    .timeline-title { font-size: 13px; color: #D4CFC2; }
    .timeline-pct { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #8A8478; font-variant-numeric: tabular-nums; }

    /* TABBAR */
    .tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(14, 13, 11, 0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid #2A2722; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); display: flex; justify-content: space-around; z-index: 100; }
    .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px; color: #5A554A; transition: color 0.15s ease; }
    .tab.active { color: #E8A547; }
    .tab-icon { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; line-height: 1; }
    .tab-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; }

    .footer-actions { padding: 24px 20px; display: flex; justify-content: space-between; gap: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #5A554A; }
    .text-btn { padding: 6px 10px; border: 1px solid #2A2722; border-radius: 2px; letter-spacing: 0.1em; text-transform: lowercase; }
    .text-btn:active { background: #1F1A12; }

    .footnote { padding: 0 20px 12px; font-size: 12px; color: #8A8478; font-style: italic; line-height: 1.5; }
    .empty { text-align: center; padding: 40px 20px; color: #8A8478; }

    /* SETTINGS MODAL */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s ease; }
    .modal { background: #16140F; border: 1px solid #2A2722; border-radius: 12px 12px 0 0; width: 100%; max-width: 480px; padding: 24px 20px calc(24px + env(safe-area-inset-bottom)); max-height: 85vh; overflow-y: auto; animation: slideUp 0.25s ease; }
    @keyframes slideUp { from { transform: translateY(40px); } to { transform: translateY(0); } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: #F2EDE3; }
    .modal-close { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #8A8478; padding: 4px 10px; border: 1px solid #2A2722; border-radius: 2px; }
    .form-row { margin-bottom: 16px; }
    .form-label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; color: #8A8478; text-transform: uppercase; margin-bottom: 6px; }
    .form-input { width: 100%; background: #0E0D0B; border: 1px solid #2A2722; border-radius: 4px; padding: 10px 12px; color: #E8E4DC; font-family: 'JetBrains Mono', monospace; font-size: 13px; outline: none; }
    .form-input:focus { border-color: #E8A547; }
    .form-hint { font-size: 11px; color: #8A8478; margin-top: 4px; font-style: italic; line-height: 1.4; }
    .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-top: 1px solid #2A2722; }
    .toggle-row:first-child { border-top: none; }
    .toggle-label { font-size: 14px; color: #D4CFC2; }
    .toggle-switch { width: 42px; height: 24px; background: #2A2722; border-radius: 12px; position: relative; cursor: pointer; transition: background 0.2s ease; }
    .toggle-switch.on { background: #7A8B6F; }
    .toggle-knob { position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #F2EDE3; border-radius: 50%; transition: transform 0.2s ease; }
    .toggle-switch.on .toggle-knob { transform: translateX(18px); }
    .btn-primary { width: 100%; background: #E8A547; color: #0E0D0B; padding: 12px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 12px; }
    .btn-primary:active { background: #D4943C; }
    .btn-primary:disabled { opacity: 0.5; }
    .sync-msg { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 10px; border-radius: 4px; margin-top: 12px; }
    .sync-msg.ok { background: rgba(122, 139, 111, 0.1); color: #A8B59E; border: 1px solid rgba(122, 139, 111, 0.3); }
    .sync-msg.err { background: rgba(212, 119, 92, 0.1); color: #D4775C; border: 1px solid rgba(212, 119, 92, 0.3); }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">runway<span class="dot">.</span></div>
      <div style="display:flex; align-items:center; gap: 14px;">

    // ============================================================
    // CONFIG
    // ============================================================
    const START_DATE = new Date('2026-05-21T00:00:00');
    const STORAGE_KEY = 'runway:v1';
    const PHASE_COLORS = {
      'DevOps Fundamentals': '#E8A547',
      'MLOps Bridge': '#D4775C',
      'UPenn Semester': '#7A8B6F',
    };
    const MILESTONES = {
      1: { label: 'START', desc: 'May 21, 2026' },
      9: { label: 'ML BRIDGE', desc: 'Foundation → MLOps' },
      14: { label: 'UPENN', desc: 'Grad school begins' },
      20: { label: 'CAPSTONE', desc: 'Portfolio-ready' },
    };

    // ============================================================
    // STATE
    // ============================================================
    let state = {
      progress: {},
      activeTab: 'now',
      selectedWeek: 1,
      expandedBriefs: new Set(), // ephemeral UI state, not persisted
      showSettings: false,
      syncStatus: 'offline', // 'offline' | 'connecting' | 'synced' | 'syncing' | 'error'
    };
    let syncConfig = { url: '', email: '', password: '', enabled: false };
    let pbCtx = { token: null, userId: null, recordId: null };
    let pushTimer = null;

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          state.progress = parsed.progress || {};
        }
      } catch (e) { console.error('load failed', e); }
      state.selectedWeek = getCurrentWeek();
    }
    function save() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          version: 1,
          progress: state.progress,
          savedAt: new Date().toISOString(),
        }));
      } catch (e) { console.error('save failed', e); }
    }

    // ============================================================
    // SYNC (PocketBase)
    // Single-record-per-user pattern: the entire progress blob lives in
    // one record. Simple, no merge logic. Last-write-wins.
    // For Brandon's use case (1 user, 2 devices, rarely concurrent edits)
    // this is plenty. If you upgrade to a team product, split into
    // per-key records and add merge logic.
    // ============================================================
    const SYNC_CONFIG_KEY = 'runway:sync-config';

    function loadSyncConfig() {
      try {
        const raw = localStorage.getItem(SYNC_CONFIG_KEY);
        if (raw) syncConfig = { ...syncConfig, ...JSON.parse(raw) };
      } catch (e) { console.error('loadSyncConfig failed', e); }
    }
    function saveSyncConfig() {
      try { localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify(syncConfig)); }
      catch (e) { console.error('saveSyncConfig failed', e); }
    }

    async function pbAuth() {
      const res = await fetch(`${syncConfig.url}/api/collections/users/auth-with-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identity: syncConfig.email, password: syncConfig.password }),
      });
      if (!res.ok) throw new Error('Auth failed: ' + res.status);
      const data = await res.json();
      pbCtx.token = data.token;
      pbCtx.userId = data.record.id;
    }

    async function pbFetchState() {
      const url = `${syncConfig.url}/api/collections/state/records?filter=(user='${pbCtx.userId}')&perPage=1`;
      const res = await fetch(url, { headers: { 'Authorization': pbCtx.token } });
      if (!res.ok) throw new Error('Fetch failed: ' + res.status);
      const data = await res.json();
      return data.items[0] || null;
    }

    async function pbSaveState() {
      const body = JSON.stringify({ user: pbCtx.userId, data: state.progress });
      const headers = { 'Content-Type': 'application/json', 'Authorization': pbCtx.token };
      let res;
      if (pbCtx.recordId) {
        res = await fetch(`${syncConfig.url}/api/collections/state/records/${pbCtx.recordId}`, { method: 'PATCH', headers, body });
      } else {
        res = await fetch(`${syncConfig.url}/api/collections/state/records`, { method: 'POST', headers, body });
      }
      if (!res.ok) throw new Error('Save failed: ' + res.status);
      const data = await res.json();
      pbCtx.recordId = data.id;
    }

    async function syncPull() {
      if (!syncConfig.enabled || !syncConfig.url) return;
      try {
        state.syncStatus = 'syncing'; updateSyncIndicator();
        if (!pbCtx.token) await pbAuth();
        const record = await pbFetchState();
        if (record) {
          pbCtx.recordId = record.id;
          state.progress = record.data || {};
          save();
        }
        state.syncStatus = 'synced'; updateSyncIndicator();
        render();
      } catch (e) {
        console.error('syncPull failed', e);
        state.syncStatus = 'error'; updateSyncIndicator();
      }
    }

    async function syncPush() {
      if (!syncConfig.enabled || !syncConfig.url) return;
      try {
        state.syncStatus = 'syncing'; updateSyncIndicator();
        if (!pbCtx.token) await pbAuth();
        if (!pbCtx.recordId) {
          // Need to know if a record exists before deciding POST vs PATCH
          const existing = await pbFetchState();
          if (existing) pbCtx.recordId = existing.id;
        }
        await pbSaveState();
        state.syncStatus = 'synced'; updateSyncIndicator();
      } catch (e) {
        console.error('syncPush failed', e);
        state.syncStatus = 'error'; updateSyncIndicator();
      }
    }

    function debouncedPush() {
      if (!syncConfig.enabled) return;
      if (pushTimer) clearTimeout(pushTimer);
      pushTimer = setTimeout(() => syncPush(), 800);
    }

    function updateSyncIndicator() {
      const el = document.getElementById('syncIndicator');
      if (!el) return;
      const map = {
        offline: { color: '#5A554A', label: 'local' },
        connecting: { color: '#8FA6B5', label: 'sync…' },
        syncing: { color: '#8FA6B5', label: 'sync…' },
        synced: { color: '#7A8B6F', label: 'synced' },
        error: { color: '#D4775C', label: 'error' },
      };
      const s = map[state.syncStatus] || map.offline;
      el.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:${s.color};display:inline-block;"></span><span style="color:${s.color};">${s.label}</span>`;
    }

    // Background poll for changes from other devices, every 45s
    setInterval(() => {
      if (syncConfig.enabled && state.syncStatus !== 'syncing') syncPull();
    }, 45000);
    // Pull on tab focus too
    window.addEventListener('focus', () => {
      if (syncConfig.enabled && state.syncStatus !== 'syncing') syncPull();
    });

    // ============================================================
    // HELPERS
    // ============================================================
    function daysBetween(a, b) {
      const A = new Date(a.getFullYear(), a.getMonth(), a.getDate());
      const B = new Date(b.getFullYear(), b.getMonth(), b.getDate());
      return Math.floor((B - A) / 86400000);
    }
    function getCurrentWeek() {
      const diff = daysBetween(START_DATE, new Date());
      return Math.max(1, Math.min(20, Math.floor(diff / 7) + 1));
    }
    function getCurrentDayIdx() {
      const diff = daysBetween(START_DATE, new Date());
      return ((diff % 7) + 7) % 7;
    }
    function getWeekStart(weekNum) {
      const d = new Date(START_DATE);
      d.setDate(d.getDate() + (weekNum - 1) * 7);
      return d;
    }
    function formatDate(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
    function dayLabel(offset) { return ['M', 'T', 'W', 'T', 'F', 'S', 'S'][offset]; }
    function dayFullName(offset) { return ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'][offset]; }

    function computeStats() {
      let total = 0, done = 0, projects = 0, sds = 0;
      for (let w = 1; w <= 20; w++) {
        for (let d = 0; d < 7; d++) {
          total += 2;
          if (state.progress[`w${w}_d${d}_a`]) done++;
          if (state.progress[`w${w}_d${d}_b`]) done++;
        }
        if (state.progress[`w${w}_project`]) projects++;
        if (state.progress[`w${w}_sd`]) sds++;
      }
      const today = new Date();
      let streak = 0;
      for (let back = 0; back < 140; back++) {
        const d = new Date(today); d.setDate(today.getDate() - back);
        const diff = daysBetween(START_DATE, d);
        if (diff < 0) break;
        const w = Math.floor(diff / 7) + 1;
        const di = diff % 7;
        if (w < 1 || w > 20) continue;
        const a = state.progress[`w${w}_d${di}_a`];
        const b = state.progress[`w${w}_d${di}_b`];
        if (a || b) streak++; else break;
      }
      return { total, done, projects, sds, streak, pct: total ? Math.round(done / total * 100) : 0 };
    }

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // ============================================================
    // ACTIONS
    // ============================================================
    function toggleBlock(week, day, block) {
      state.progress[`w${week}_d${day}_${block}`] = !state.progress[`w${week}_d${day}_${block}`];
      save(); debouncedPush(); render();
    }
    function toggleProject(week) {
      state.progress[`w${week}_project`] = !state.progress[`w${week}_project`];
      save(); debouncedPush(); render();
    }
    function toggleSD(week) {
      state.progress[`w${week}_sd`] = !state.progress[`w${week}_sd`];
      save(); debouncedPush(); render();
    }
    function toggleBrief(id) {
      if (state.expandedBriefs.has(id)) state.expandedBriefs.delete(id);
      else state.expandedBriefs.add(id);
      render();
    }
    function setTab(tab) {
      state.activeTab = tab;
      if (tab === 'week') state.selectedWeek = getCurrentWeek();
      state.expandedBriefs.clear(); // collapse briefs on tab switch
      render();
    }
    function selectWeek(w) {
      state.selectedWeek = w;
      state.activeTab = 'week';
      state.expandedBriefs.clear();
      render();
    }
    function resetAll() {
      if (confirm('Reset ALL progress? This cannot be undone.')) {
        state.progress = {}; save(); render();
      }
    }
    function exportData() {
      const blob = new Blob([JSON.stringify({ progress: state.progress, exportedAt: new Date().toISOString() }, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `runway-backup-${new Date().toISOString().split('T')[0]}.json`;
      a.click(); URL.revokeObjectURL(url);
    }

    // ============================================================
    // BRIEF RENDERING
    // ============================================================
    function renderBrief(briefId, brief, variant) {
      // variant: 'a' (default amber), 'b' (sage), 'sd' (blue)
      const open = state.expandedBriefs.has(briefId);
      const variantClass = variant === 'b' ? 'b-brief' : (variant === 'sd' ? 'sd-brief' : '');
      const terms = (brief.terms || []).map(t => `<span class="brief-term">${escapeHtml(t)}</span>`).join('');
      const tests = (brief.test || []).map(t => `<li>${escapeHtml(t)}</li>`).join('');
      const doneWhen = brief.doneWhen ? `<div class="brief-section"><div class="brief-label">Done When</div><div class="brief-done">${escapeHtml(brief.doneWhen)}</div></div>` : '';

      return `
        <button class="learn-toggle ${open ? 'open' : ''}" data-action="toggle-brief" data-brief="${briefId}">
          <span class="arrow">›</span>
          <span>${open ? 'Hide' : 'Learn'} the concept</span>
        </button>
        <div class="brief ${variantClass} ${open ? 'open' : ''}">
          <div class="brief-section">
            <div class="brief-label">Core Insight</div>
            <div class="brief-text">${escapeHtml(brief.insight)}</div>
          </div>
          <div class="brief-section">
            <div class="brief-label">Why This Matters</div>
            <div class="brief-why">${escapeHtml(brief.why)}</div>
          </div>
          <div class="brief-section">
            <div class="brief-label">Key Terms</div>
            <div class="brief-terms">${terms}</div>
          </div>
          <div class="brief-section">
            <div class="brief-label">Best Resource</div>
            <div class="brief-resource">${escapeHtml(brief.resource)}</div>
          </div>
          <div class="brief-section">
            <div class="brief-label">Self-Test</div>
            <ul class="brief-tests">${tests}</ul>
          </div>
          ${doneWhen}
        </div>
      `;
    }

    // ============================================================
    // RENDER VIEWS
    // ============================================================
    function render() {
      const stats = computeStats();
      document.getElementById('streakNum').textContent = stats.streak;
      document.getElementById('streakPlural').textContent = stats.streak === 1 ? '' : 's';
      document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === state.activeTab));
      const view = document.getElementById('view');
      if (state.activeTab === 'now') view.innerHTML = renderNow();
      else if (state.activeTab === 'week') view.innerHTML = renderWeek();
      else if (state.activeTab === 'plan') view.innerHTML = renderPlan(stats);
      attachHandlers();
      renderSettingsModal();
      updateSyncIndicator();
    }

    function renderWeek() {
      const w = state.selectedWeek;
      const week = CURRICULUM[w - 1];
      const weekStart = getWeekStart(w);
      const curWeek = getCurrentWeek();
      const curDay = getCurrentDayIdx();
      const isNow = w === curWeek;

      const dayCells = Array.from({length: 7}).map((_, d) => {
        const dayDate = new Date(weekStart); dayDate.setDate(weekStart.getDate() + d);
        const isToday = isNow && d === curDay;
        const aDone = !!state.progress[`w${w}_d${d}_a`];
        const bDone = !!state.progress[`w${w}_d${d}_b`];
        return `
          <div class="day-col ${isToday ? 'today' : ''}">
            <div class="day-label">${dayLabel(d)}</div>
            <div class="day-date">${dayDate.getDate()}</div>
            <button class="check-btn ${aDone ? 'done-a' : ''}" data-action="toggle" data-week="${w}" data-day="${d}" data-block="a">${aDone ? '●' : 'A'}</button>
            <button class="check-btn ${bDone ? 'done-b' : ''}" data-action="toggle" data-week="${w}" data-day="${d}" data-block="b">${bDone ? '●' : 'B'}</button>
          </div>
        `;
      }).join('');

      const projDone = !!state.progress[`w${w}_project`];
      const sdDone = !!state.progress[`w${w}_sd`];
      const prev = w > 1 ? `<button class="text-btn" data-action="select-week" data-week="${w-1}">← W${w-1}</button>` : '<span></span>';
      const next = w < 20 ? `<button class="text-btn" data-action="select-week" data-week="${w+1}">W${w+1} →</button>` : '<span></span>';

      return `
        <div style="display:flex; justify-content: space-between; margin-bottom: 16px;">${prev}${next}</div>

        <span class="phase-tag" style="background: ${PHASE_COLORS[week.phase]}">${week.phase}</span>
        <div class="week-meta">
          WEEK ${String(week.num).padStart(2,'0')} · ${formatDate(weekStart)} – ${formatDate(new Date(weekStart.getTime() + 6 * 86400000))}
          ${isNow ? '<span class="now-badge">NOW</span>' : ''}
        </div>
        <div class="week-title">${escapeHtml(week.title)}</div>

        <div class="block-section">
          <div class="block-header">
            <span class="block-tag">BLOCK A</span>
            <span class="block-duration">Build · 45 min</span>
          </div>
          <div class="block-text">${escapeHtml(week.blockA.task)}</div>
          ${renderBrief(`wk-a-${w}`, week.blockA.brief, 'a')}
        </div>

        <div class="block-section">
          <div class="block-header">
            <span class="block-tag b">BLOCK B</span>
            <span class="block-duration">Understand · 30 min</span>
          </div>
          <div class="block-text">${escapeHtml(week.blockB.task)}</div>
          ${renderBrief(`wk-b-${w}`, week.blockB.brief, 'b')}
        </div>

        <div class="day-grid">${dayCells}</div>

        <div class="project-section">
          <div class="project-label">Week ${w} Mini Project</div>
          <button class="project-btn ${projDone ? 'done' : ''}" data-action="toggle-project" data-week="${w}">
            <span class="project-check">${projDone ? '✓' : '○'}</span>
            <span>${escapeHtml(week.project)}</span>
          </button>
        </div>

        <div class="sd-section">
          <div class="sd-label">System Design · Week ${w}</div>
          <div class="sd-card ${sdDone ? 'done' : ''}">
            <div class="sd-card-header" data-action="toggle-sd" data-week="${w}">
              <span class="sd-check">${sdDone ? '✓' : '○'}</span>
              <div class="sd-body">
                <div class="sd-topic">${escapeHtml(week.sd.topic)}</div>
                <div class="sd-meta">${escapeHtml(week.sd.source)}</div>
                <div class="sd-cadence">2–3 SESSIONS · ~30 MIN EACH</div>
              </div>
            </div>
            ${renderBrief(`wk-sd-${w}`, week.sd.brief, 'sd')}
          </div>
        </div>
      `;
    }

    function renderSettingsModal() {
      const container = document.getElementById('modalContainer');
      if (!state.showSettings) { container.innerHTML = ''; return; }
      container.innerHTML = `
        <div class="modal-backdrop" data-action="close-settings">
          <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
              <div class="modal-title">Sync Settings</div>
              <button class="modal-close" data-action="close-settings">close</button>
            </div>

            <div class="toggle-row">
              <span class="toggle-label">Cloud sync</span>
              <div class="toggle-switch ${syncConfig.enabled ? 'on' : ''}" data-action="toggle-sync">
                <div class="toggle-knob"></div>
              </div>
            </div>

            <div class="form-row" style="margin-top: 16px;">
              <label class="form-label">PocketBase URL</label>
              <input class="form-input" id="syncUrl" type="text" placeholder="http://100.x.x.x:8090" value="${escapeHtml(syncConfig.url)}" />
              <div class="form-hint">Your PocketBase server. Use your Tailscale IP for access from anywhere.</div>
            </div>
            <div class="form-row">
              <label class="form-label">Email</label>
              <input class="form-input" id="syncEmail" type="email" placeholder="you@example.com" value="${escapeHtml(syncConfig.email)}" />
            </div>
            <div class="form-row">
              <label class="form-label">Password</label>
              <input class="form-input" id="syncPassword" type="password" placeholder="••••••••" value="${escapeHtml(syncConfig.password)}" />
              <div class="form-hint">Stored only in this browser's localStorage. Never sent anywhere except your PocketBase.</div>
            </div>

            <button class="btn-primary" data-action="save-sync">Save & Test Connection</button>

            <div id="syncMsg"></div>

            <div style="margin-top: 24px; padding-top: 20px; border-top: 1px solid #2A2722;">
              <div class="form-label">Status</div>
              <div style="font-size: 13px; color: #D4CFC2; line-height: 1.6;">
                ${state.syncStatus === 'synced' ? '✓ Synced with PocketBase' : ''}
                ${state.syncStatus === 'offline' ? 'Working offline — local only' : ''}
                ${state.syncStatus === 'error' ? '⚠ Connection error — check URL and credentials' : ''}
                ${state.syncStatus === 'syncing' ? '↻ Syncing...' : ''}
              </div>
            </div>
          </div>
        </div>
      `;
      // Wire up modal handlers
      container.querySelectorAll('[data-action]').forEach(el => {
        el.addEventListener('click', e => {
          e.stopPropagation();
          const action = el.dataset.action;
          if (action === 'close-settings') closeSettings();
          else if (action === 'toggle-sync') {
            syncConfig.enabled = !syncConfig.enabled;
            saveSyncConfig();
            if (syncConfig.enabled) syncPull();
            else { state.syncStatus = 'offline'; updateSyncIndicator(); }
            renderSettingsModal();
          }
          else if (action === 'save-sync') saveSyncSettings();
        });
      });
    }

    function openSettings() { state.showSettings = true; renderSettingsModal(); }
    function closeSettings() { state.showSettings = false; renderSettingsModal(); }

    async function saveSyncSettings() {
      const url = document.getElementById('syncUrl').value.trim().replace(/\/$/, '');
      const email = document.getElementById('syncEmail').value.trim();
      const password = document.getElementById('syncPassword').value;
      syncConfig = { ...syncConfig, url, email, password };
      saveSyncConfig();
      pbCtx = { token: null, userId: null, recordId: null };

      const msgEl = document.getElementById('syncMsg');
      msgEl.innerHTML = '<div class="sync-msg">Testing...</div>';
      try {
        await pbAuth();
        await syncPull();
        msgEl.innerHTML = '<div class="sync-msg ok">✓ Connected. Initial sync complete.</div>';
        // After successful first sync, push current local in case it has new data
        await syncPush();
      } catch (e) {
        msgEl.innerHTML = `<div class="sync-msg err">✗ ${escapeHtml(e.message)}</div>`;
      }
    }

    function renderPlan(stats) {
      const curWeek = getCurrentWeek();
      const rows = CURRICULUM.map(w => {
        const milestone = MILESTONES[w.num];
        const blocks = Array.from({length: 7}).reduce((s, _, d) => s + (state.progress[`w${w.num}_d${d}_a`] ? 1 : 0) + (state.progress[`w${w.num}_d${d}_b`] ? 1 : 0), 0);
        const pct = Math.round(blocks / 14 * 100);
        const cls = w.num === curWeek ? 'current' : (w.num < curWeek ? 'past' : '');
        const projDone = state.progress[`w${w.num}_project`];
        const sdDone = state.progress[`w${w.num}_sd`];
        const badges = `<span style="display:inline-flex; gap:3px; margin-right:6px;">
          <span style="width:5px;height:5px;border-radius:50%;background:${projDone ? '#7A8B6F' : '#2A2722'};display:inline-block;"></span>
          <span style="width:5px;height:5px;border-radius:50%;background:${sdDone ? '#8FA6B5' : '#2A2722'};display:inline-block;"></span>
        </span>`;
        return `
          ${milestone ? `<div class="milestone-row"><span class="milestone-label">◆ ${milestone.label}</span><span class="milestone-desc">${milestone.desc}</span></div>` : ''}
          <button class="timeline-row ${cls}" data-action="select-week" data-week="${w.num}">
            <span class="timeline-dot" style="background: ${PHASE_COLORS[w.phase]}"></span>
            <span class="timeline-num">W${String(w.num).padStart(2,'0')}</span>
            <span class="timeline-title">${escapeHtml(w.title)}</span>
            <span class="timeline-pct">${badges}${pct > 0 ? pct + '%' : '·'}</span>
          </button>
        `;
      }).join('');

      return `
        <div class="kicker">Overview</div>
        <div class="stats" style="grid-template-columns: repeat(3, 1fr); gap: 10px;">
          <div class="stat">
            <div class="stat-label">Blocks</div>
            <div class="stat-value">${stats.done}<span style="color:#8A8478; font-size:13px;">/${stats.total}</span></div>
            <div class="stat-bar"><div class="stat-bar-fill" style="width:${stats.pct}%"></div></div>
          </div>
          <div class="stat">
            <div class="stat-label">Projects</div>
            <div class="stat-value">${stats.projects}<span style="color:#8A8478; font-size:13px;">/20</span></div>
            <div class="stat-bar"><div class="stat-bar-fill" style="width:${Math.round(stats.projects/20*100)}%"></div></div>
          </div>
          <div class="stat">
            <div class="stat-label">Sys Design</div>
            <div class="stat-value">${stats.sds}<span style="color:#8A8478; font-size:13px;">/20</span></div>
            <div class="stat-bar"><div class="stat-bar-fill" style="width:${Math.round(stats.sds/20*100)}%; background:#8FA6B5;"></div></div>
          </div>
        </div>

        <div class="kicker" style="margin-top: 24px;">Timeline</div>
        ${rows}

        <div class="footer-actions">
          <button class="text-btn" data-action="export">export backup</button>
          <button class="text-btn" data-action="reset">reset all</button>
        </div>
      `;
    }

    // ============================================================
    // EVENT HANDLERS
    // ============================================================
    function attachHandlers() {
      document.querySelectorAll('[data-action]').forEach(el => {
        el.addEventListener('click', e => {
          e.stopPropagation();
          const action = el.dataset.action;
          if (action === 'toggle') toggleBlock(+el.dataset.week, +el.dataset.day, el.dataset.block);
          else if (action === 'toggle-project') toggleProject(+el.dataset.week);
          else if (action === 'toggle-sd') toggleSD(+el.dataset.week);
          else if (action === 'toggle-brief') toggleBrief(el.dataset.brief);
          else if (action === 'select-week') selectWeek(+el.dataset.week);
          else if (action === 'reset') resetAll();
          else if (action === 'export') exportData();
          else if (action === 'open-settings') openSettings();
        });
      });
    }
    document.querySelectorAll('.tab').forEach(el => el.addEventListener('click', () => setTab(el.dataset.tab)));

    load();
    loadSyncConfig();
    render();
    updateSyncIndicator();
    if (syncConfig.enabled) syncPull();
  </script>
</body>
</html>
